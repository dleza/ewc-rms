{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Meeting Collections</h4>
  <a class="btn btn-primary" href="{% url 'finance:collections_create' %}">New Collection</a>
</div>

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-striped mb-0">
      <thead>
        <tr>
          <th>Date</th>
          <th>Counter</th>
          <th class="text-end">Total</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for c in object_list %}
        <tr>
          <td>{{ c.date }}</td>
          <td>{{ c.name_of_counter }}</td>
          <td class="text-end fw-semibold">{{ c.total }}</td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-secondary" href="{% url 'finance:collections_update' c.pk %}">Edit</a>
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="text-center py-4">No collections found.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
