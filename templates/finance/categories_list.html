{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Budget Categories</h4>
  <a class="btn btn-primary" href="{% url 'finance:categories_create' %}">New Category</a>
</div>

<div class="card shadow-sm mb-3">
  <div class="card-body">
    <form class="row g-2">
      <div class="col-md-8">
        <input name="q" value="{{ request.GET.q }}" class="form-control" placeholder="Search category name">
      </div>
      <div class="col-md-4 d-flex gap-2">
        <button class="btn btn-outline-primary w-100">Search</button>
        <a class="btn btn-outline-secondary w-100" href="{% url 'finance:categories_list' %}">Reset</a>
      </div>
    </form>
  </div>
</div>

<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-striped mb-0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Active</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for c in object_list %}
        <tr>
          <td>{{ c.name }}</td>
          <td>{% if c.is_active %}Yes{% else %}No{% endif %}</td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-secondary" href="{% url 'finance:categories_update' c.pk %}">Edit</a>
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="text-center py-4">No categories found.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
