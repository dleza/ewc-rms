{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Exalted Word RMS{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .card {
      border-radius: 1rem;
    }

    .card-title {
      font-weight: 600;
    }

    .list-group-item {
      border-left: 0;
      border-right: 0;
    }

    .navbar-brand {
      font-weight: 700;
    }

    .rounded-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
    }

    .kpi-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 500;
    }
  </style>

  <link rel="icon" href="{% static 'images/favicon_io/favicon.ico' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'image/favicon_io/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'image/favicon_io/favicon-16x16.png' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'image/favicon_io/apple-touch-icon.png' %}">
  <link rel="manifest" href="{% static 'image/favicon_io/site.webmanifest' %}">
</head>
<body style="background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);">

  {% if user.is_authenticated %}
    {% include "includes/nav.html" %}
  {% endif %}

  <main class="container py-4">
    {% include "includes/messages.html" %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
